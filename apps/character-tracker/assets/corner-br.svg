<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 260" width="260" height="260">
  <defs>
    <linearGradient id="g1" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#8B7535" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8B7535" stop-opacity="0.12"/>

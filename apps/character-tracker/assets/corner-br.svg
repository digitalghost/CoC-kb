  <path d="M259,205 L252,202 L259,199" fill="none" stroke="url(#g2)" stroke-width="0.9"/>
  <path d="M258,180 L251,177 L258,174" fill="none" stroke="url(#g2)" stroke-width="0.9"/>
  <path d="M259,155 L252,152 L259,149" fill="none" stroke="url(#g2)" stroke-width="0.9"/>
  <!-- === ARCANE CIRCLE with ALL-SEEING EYE === -->
  <circle cx="208" cy="174" r="18" fill="none" stroke="url(#g1)" stroke-width="1.2" stroke-dasharray="4,2.5"/>
  <circle cx="208" cy="174" r="13" fill="none" stroke="url(#g2)" stroke-width="0.9"/>
  <circle cx="208" cy="174" r="8" fill="none" stroke="url(#g3)" stroke-width="0.7"/>

  <path d="M198,174 Q208,166 218,174 Q208,182 198,174 Z" fill="none" stroke="url(#g1)" stroke-width="1.3"/>
  <circle cx="208" cy="174" r="2.5" fill="#C9A84C" opacity="0.55"/>
  <circle cx="208" cy="174" r="1" fill="#0A0E14" opacity="0.6"/>

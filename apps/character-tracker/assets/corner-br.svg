  <path d="M195,259 L192,252 L189,259" fill="none" stroke="url(#g2)" stroke-width="0.9"/>
  <path d="M165,260 L162,253 L159,260" fill="none" stroke="url(#g2)" stroke-width="0.9"/>
  <path d="M140,258 L137,251 L134,258" fill="none" stroke="url(#g2)" stroke-width="0.9"/>

    <linearGradient id="g3" x1="100%" y1="100%" x2="20%" y2="20%">
      <stop offset="0%" stop-color="#E8C86A" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8B7535" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <!-- === PRIMARY TENDRIL from bottom-right === -->
  <path d="M260,260 C235,252 210,238 192,215 C178,197 180,175 195,162 C205,153 218,155 220,165 C222,172 215,178 208,174"

  <circle cx="235" cy="205" r="2" fill="#C9A84C" opacity="0.3"/>
  <circle cx="180" cy="220" r="1.5" fill="#C9A84C" opacity="0.25"/>
  <circle cx="150" cy="240" r="1.8" fill="#C9A84C" opacity="0.2"/>
  <circle cx="252" cy="165" r="1.5" fill="#C9A84C" opacity="0.2"/>
  <circle cx="120" cy="210" r="1.2" fill="#C9A84C" opacity="0.18"/>
  <circle cx="215" cy="140" r="1.3" fill="#C9A84C" opacity="0.15"/>
  <!-- === CORNER ANCHOR LINES === -->
  <line x1="260" y1="260" x2="238" y2="260" stroke="url(#g1)" stroke-width="3"/>
  <line x1="260" y1="260" x2="260" y2="238" stroke="url(#g1)" stroke-width="3"/>
  <!-- === TINY RUNIC MARKS === -->
  <path d="M100,248 L95,255 L90,248" fill="none" stroke="url(#g3)" stroke-width="0.8"/>
  <path d="M255,120 L250,127 L245,120" fill="none" stroke="url(#g3)" stroke-width="0.8"/>
